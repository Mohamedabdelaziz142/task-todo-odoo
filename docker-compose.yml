version: '3.8'
services:
  todo-db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    ports:
      - "5433:5432"
    volumes:
      - todo-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  todo-odoo:
    image: odoo:17
    depends_on:
      - todo-db
    ports:
      - "8070:8069"
    volumes:
      - ./extra-addons:/mnt/extra-addons
      - todo-odoo-data:/var/lib/odoo
    environment:
      - HOST=todo-db
      - USER=odoo
      - PASSWORD=odoo
      # This line below is the most important one for your custom modules!
      - ADDONS_PATH=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
    restart: unless-stopped

volumes:
  todo-db-data:
  todo-odoo-data: